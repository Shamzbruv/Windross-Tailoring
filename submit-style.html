<!DOCTYPE html>
<html lang="en">

<head>
    <script src="js/region.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your Design | Windross Tailoring</title>
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ========================================
           THEME: MIDNIGHT GOLD (Bespoke Edition)
           ========================================
        */
        :root {
            /* Metallic Gold */
            --gold-primary: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 40%, #B38728 60%, #AA771C 100%);
            --gold-glow: 0 0 20px rgba(212, 175, 55, 0.2);

            /* Dark Environment */
            --bg-body: #050505;
            --bg-panel: #0F0F0F;
            --bg-border: #222;

            /* Text */
            --text-main: #F5F5F7;
            --text-muted: #86868B;

            --ease-lux: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 80%);
        }

        /* --- NAVIGATION --- */
        nav {
            height: 80px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--bg-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-center {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--gold-primary);
            letter-spacing: 1px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--bg-border);
            padding: 10px 24px;
            border-radius: 2px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .action-btn:hover {
            border-color: var(--gold-primary);
            color: var(--gold-primary);
        }

        /* --- CONTAINER --- */
        .container {
            margin-top: 120px;
            margin-bottom: 100px;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 0.8s var(--ease-lux);
        }

        .header-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 15px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* --- FORM --- */
        .submit-form {
            background: var(--bg-panel);
            border: 1px solid var(--bg-border);
            padding: 40px;
            border-radius: 4px;
            animation: slideUp 0.8s var(--ease-lux);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: white;
            font-weight: 500;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--bg-border);
            color: white;
            padding: 15px;
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--gold-gradient);
            color: black;
            border: none;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            box-shadow: var(--gold-glow);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2.2rem;
            }

            .submit-form {
                padding: 25px;
            }

            .nav-center {
                display: none;
            }
        }
    </style>
<script src="js/region-manager.js"></script>
</head>

<body>

    <nav>
        <a href="index.html" class="logo">Windross</a>
        <div class="nav-center">Submit Your Design</div>
        <button class="action-btn" onclick="window.location.href='index.html'">Top</button>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Bring Your Vision to Life</h1>
            <p>Have a specific style in mind? Submit your design details below, and we will tailor it to your exact
                measurements.</p>
        </div>

        <div class="submit-form">
            <div class="form-group">
                <label>Design Name</label>
                <input type="text" id="design-name" placeholder="e.g. Vintage Velvet Tuxedo">
            </div>

            <div class="form-group">
                <label>Who is this for?</label>
                <select id="gender">
                    <option value="male">Men</option>
                    <option value="female">Women</option>
                </select>
            </div>

            <div class="form-group">
                <label>Design Description</label>
                <textarea id="design-desc" rows="6"
                    placeholder="Describe the fabric, cut, lapels, and any specific details you envision..."></textarea>
            </div>

            <button class="btn-submit" onclick="submitDesign()">
                Next: Measurements <i data-lucide="arrow-right" style="vertical-align: middle; margin-left: 8px;"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function submitDesign() {
            const name = document.getElementById('design-name').value.trim();
            const gender = document.getElementById('gender').value;
            const desc = document.getElementById('design-desc').value.trim();

            if (!name || !desc) {
                alert("Please provide a design name and description.");
                return;
            }

            // Prepare Data
            const customData = {
                suitId: name, // Uses the user's design name as the ID/Name
                gender: gender,
                price: 850, // Base Price for Custom
                config: {
                    description: desc
                },
                measurements: {}, // Will be filled in next step
                details: {}
            };

            // Save to Session
            sessionStorage.setItem('custom_suit_data', JSON.stringify(customData));

            // Redirect to Measurements
            window.location.href = 'purchase-flow.html?suit=Custom';
        }
    </script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const isJM = window.Region && window.Region.isJamaica();
        document.querySelectorAll("a[href=\"book.html\"]").forEach(link => {
            if (!isJM) {
                link.style.display = "none";
            }
        });
    });
</script>
</body>

</html>
