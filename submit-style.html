<!DOCTYPE html>
<html lang="en">

<head>
    <script src="js/region.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your Design | Windross Tailoring</title>
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ========================================
           THEME: MIDNIGHT GOLD (Bespoke Edition)
           ========================================
        */
        :root {
            /* Metallic Gold */
            --gold-primary: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 40%, #B38728 60%, #AA771C 100%);
            --gold-glow: 0 0 20px rgba(212, 175, 55, 0.2);

            /* Dark Environment */
            --bg-body: #050505;
            --bg-panel: #0F0F0F;
            --bg-border: #222;

            /* Text */
            --text-main: #F5F5F7;
            --text-muted: #86868B;

            --ease-lux: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 80%);
        }

        /* --- NAVIGATION --- */
        nav {
            height: 80px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--bg-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-center {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--gold-primary);
            letter-spacing: 1px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--bg-border);
            padding: 10px 24px;
            border-radius: 2px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .action-btn:hover {
            border-color: var(--gold-primary);
            color: var(--gold-primary);
        }

        /* --- CONTAINER --- */
        .container {
            margin-top: 120px;
            margin-bottom: 100px;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 0.8s var(--ease-lux);
        }

        .header-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 15px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* --- FORM --- */
        .submit-form {
            background: var(--bg-panel);
            border: 1px solid var(--bg-border);
            padding: 40px;
            border-radius: 4px;
            animation: slideUp 0.8s var(--ease-lux);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: white;
            font-weight: 500;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--bg-border);
            color: white;
            padding: 15px;
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--gold-gradient);
            color: black;
            border: none;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            box-shadow: var(--gold-glow);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2.2rem;
            }

            .submit-form {
                padding: 25px;
            }

            .nav-center {
                display: none;
            }
        }
    </style>
<script src="js/region-manager.js"></script>
</head>

<body>

    <nav>
        <a href="index.html" class="logo">Windross</a>
        <div class="nav-center">Submit Your Design</div>
        <button class="action-btn" onclick="window.location.href='index.html'">Top</button>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Bring Your Vision to Life</h1>
            <p>Have a specific style in mind? Submit your design details below, and we will tailor it to your exact
                measurements.</p>
        </div>

        <div class="submit-form">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="customer-name" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="customer-email" placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="customer-phone" placeholder="e.g. +1 876 123 4567">
            </div>

            <hr style="border-color: var(--bg-border); margin: 30px 0;">

            <div class="form-group">
                <label>Design Name</label>
                <input type="text" id="design-name" placeholder="e.g. Vintage Velvet Tuxedo">
            </div>

            <div class="form-group">
                <label>Who is this for?</label>
                <select id="gender">
                    <option value="male">Men</option>
                    <option value="female">Women</option>
                </select>
            </div>

            <div class="form-group">
                <label>Fabric / Material Preference</label>
                <input type="text" id="fabric" placeholder="e.g. Italian Wool, Silk lined, etc.">
            </div>

            <div class="form-group">
                <label>Event / Target Date</label>
                <input type="date" id="target-date" style="color-scheme: dark;">
            </div>

            <div class="form-group">
                <label>Design Inspiration (Photo)</label>
                <input type="file" id="design-photo" accept="image/*" style="padding: 10px;">
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Upload a photo of the style you want us to match.</p>
            </div>

            <div class="form-group">
                <label>Design Description & Additional Details</label>
                <textarea id="design-desc" rows="5"
                    placeholder="Describe the cut, lapels, and any specific details you envision..."></textarea>
            </div>

            <button class="btn-submit" onclick="submitDesign()">
                Submit Design to Tailor <i data-lucide="send" style="vertical-align: middle; margin-left: 8px;" width="18"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function submitDesign() {
            const customerName = document.getElementById('customer-name').value.trim();
            const customerEmail = document.getElementById('customer-email').value.trim();
            const customerPhone = document.getElementById('customer-phone').value.trim();
            
            const designName = document.getElementById('design-name').value.trim();
            const gender = document.getElementById('gender').value;
            const fabric = document.getElementById('fabric').value.trim();
            const targetDate = document.getElementById('target-date').value;
            const desc = document.getElementById('design-desc').value.trim();

            if (!customerName || !customerEmail || !designName || !desc) {
                alert("Please fill in your Contact Details, Design Name, and Description.");
                return;
            }

            const btn = document.querySelector('.btn-submit');
            const originalContent = btn.innerHTML;
            btn.innerHTML = 'Sending...';
            btn.disabled = true;

            try {
                // File reading
                const fileInput = document.getElementById('design-photo');
                let photoBase64 = null;
                let photoName = null;
                
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    photoName = file.name;
                    photoBase64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result.split(',')[1]); // remove data URL prefix
                        reader.onerror = error => reject(error);
                        reader.readAsDataURL(file);
                    });
                }

                const payload = {
                    customerName,
                    customerEmail,
                    customerPhone,
                    designName,
                    gender,
                    fabric,
                    targetDate,
                    description: desc,
                    photoBase64,
                    photoName
                };

                const res = await fetch('/api/design/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    document.querySelector('.submit-form').innerHTML = `
                        <div style="text-align: center; padding: 40px 0;">
                            <i data-lucide="check-circle" color="var(--gold-primary)" width="64" height="64" style="margin-bottom:20px;"></i>
                            <h2 style="font-family: 'Playfair Display', serif; color: var(--gold-primary); font-size: 2.5rem; margin-bottom: 10px;">Design Sent</h2>
                            <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6;">Our master tailor will review your bespoke requirements and contact you shortly.</p>
                            <button class="action-btn" onclick="window.location.href='index.html'" style="margin-top: 30px;">Return to Home</button>
                        </div>
                    `;
                    lucide.createIcons();
                } else {
                    const data = await res.json();
                    alert("Failed to send: " + (data.error || "Unknown error"));
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert("A network error occurred. Please try again.");
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }
    </script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const isJM = window.Region && window.Region.isJamaica();
        document.querySelectorAll("a[href=\"book.html\"]").forEach(link => {
            if (!isJM) {
                link.style.display = "none";
            }
        });
    });
</script>
</body>

</html>
