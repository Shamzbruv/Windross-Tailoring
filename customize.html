<!DOCTYPE html>
<html lang="en">

<head>
    <script src="js/region.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Studio | Windross Tailoring</title>
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/currency-manager.js"></script>

    <style>
        /* ========================================
           THEME: MIDNIGHT GOLD (Wizard Edition)
           ========================================
        */
        :root {
            /* Metallic Gold */
            --gold-primary: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 40%, #B38728 60%, #AA771C 100%);
            --gold-glow: 0 0 20px rgba(212, 175, 55, 0.2);

            /* Dark Environment */
            --bg-body: #050505;
            --bg-panel: #0F0F0F;
            --bg-border: #222;

            /* Text */
            --text-main: #F5F5F7;
            --text-muted: #86868B;

            --ease-lux: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 80%);
        }

        /* Anti-Theft */
        img {
            user-select: none;
            -webkit-user-drag: none;
        }

        /* --- NAVIGATION --- */
        nav {
            height: 80px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--bg-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            nav {
                padding: 0 20px;
                height: 70px;
            }

            .nav-center {
                display: none;
                /* Hide intermediate step text on mobile to prevent collision */
            }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-center {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--gold-primary);
            letter-spacing: 1px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--bg-border);
            padding: 10px 24px;
            border-radius: 2px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 500;
            position: relative;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
        }

        /* --- FABRIC PREVIEW MODAL --- */
        .fabric-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--ease-lux);
        }

        .fabric-modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .fabric-modal-content {
            width: 90%;
            max-width: 800px;
            transform: scale(0.95) translateY(20px);
            transition: transform 0.6s var(--ease-lux);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .fabric-modal-overlay.active .fabric-modal-content {
            transform: scale(1) translateY(0);
        }

        .fabric-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .fabric-modal-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold-primary);
            font-weight: 400;
            margin: 0;
            letter-spacing: 1px;
        }

        .fabric-modal-close {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            border-radius: 50%;
        }

        .fabric-modal-close:hover {
            color: var(--gold-primary);
            background: rgba(255, 255, 255, 0.05);
            transform: rotate(90deg);
        }

        .fabric-modal-image-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(212, 175, 55, 0.1);
            position: relative;
            background: var(--bg-panel);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        .fabric-modal-image-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 8px;
            pointer-events: none;
        }

        #image-modal-img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.7s var(--ease-lux);
            cursor: crosshair;
        }

        #image-modal-img:hover {
            transform: scale(1.05);
        }

        /* --- GENDER MODAL --- */
        .gender-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s var(--ease-lux);
        }

        .gender-modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .gender-modal-content {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            transform: translateY(20px);
            transition: transform 0.8s var(--ease-lux);
        }

        .gender-modal-overlay.active .gender-modal-content {
            transform: translateY(0);
        }

        .gender-modal-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: white;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .gender-modal-content p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .gender-options {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            /* For mobile */
        }

        .gender-btn {
            background: transparent;
            border: 1px solid var(--bg-border);
            color: white;
            padding: 20px 40px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 180px;
        }

        .gender-btn:hover {
            border-color: var(--gold-primary);
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-5px);
        }

        .gender-btn i {
            color: var(--gold-primary);
            margin-bottom: 10px;
        }



        /* --- WIZARD CONTAINER --- */
        .wizard-container {
            margin-top: 120px;
            /* Nav buffer */
            margin-bottom: 100px;
            /* Footer buffer */
            width: 100%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }

        /* PROGRESS BAR */
        .progress-track {
            display: flex;
            justify-content: space-between;
            margin-bottom: 50px;
            position: relative;
        }

        .progress-track::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--bg-border);
            z-index: 1;
        }

        .step-dot {
            width: 40px;
            height: 40px;
            background: var(--bg-panel);
            border: 1px solid var(--bg-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            color: var(--text-muted);
            font-family: 'Playfair Display', serif;
            transition: 0.3s;
        }

        .step-dot.active {
            border-color: var(--gold-primary);
            color: var(--gold-primary);
            background: var(--bg-body);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .step-dot.completed {
            background: var(--gold-primary);
            color: black;
            border-color: var(--gold-primary);
        }

        /* HEADER */
        .step-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease;
        }

        .step-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 2.5rem);
            margin: 0 0 10px 0;
            color: white;
            line-height: 1.2;
        }

        .step-header p {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* OPTIONS GRID */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: slideUp 0.5s ease;
        }

        .option-card {
            background: var(--bg-panel);
            border: 1px solid var(--bg-border);
            border-radius: 4px;
            padding: 25px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }

        .option-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }

        .option-card.selected {
            border-color: var(--gold-primary);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), transparent);
        }

        .option-card.selected::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--gold-primary);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .card-icon {
            color: var(--gold-primary);
            margin-right: 15px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            flex: 1;
        }

        .card-price {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* COLOR SWATCHES */
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* MEASUREMENT FORM */
        .measurement-group {
            margin-bottom: 30px;
        }

        .measurement-group h3 {
            color: var(--gold-primary);
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--bg-border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .measure-field {
            background: var(--bg-panel);
            border: 1px solid var(--bg-border);
            padding: 20px;
            border-radius: 4px;
        }

        .measure-field label {
            display: block;
            color: white;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .measure-field p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .measure-field input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--bg-border);
            color: white;
            padding: 12px;
            border-radius: 2px;
            font-family: inherit;
        }

        .measure-field input:focus {
            border-color: var(--gold-primary);
        }

        /* FOOTER ACTIONS */
        .wizard-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg-panel);
            border-top: 1px solid var(--bg-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .btn-nav {
            padding: 12px 30px;
            border-radius: 2px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-prev {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .btn-prev:hover {
            color: white;
            border-color: var(--bg-border);
        }

        .btn-next {
            background: var(--gold-gradient);
            color: black;
        }

        .btn-next:hover {
            box-shadow: var(--gold-glow);
            transform: translateY(-2px);
        }

        /* Inline Preview Accordion */
        .inline-preview-container {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            border-radius: 8px;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.4s ease, margin-top 0.4s ease;
        }

        .option-card.selected .inline-preview-container {
            max-height: 500px;
            opacity: 1;
            margin-top: 15px;
        }

        /* Mobile Adjustments for Wizard Footer */
        /* Mobile Adjustments for Wizard Footer */
        @media (max-width: 768px) {
            .wizard-footer {
                flex-direction: column;
                padding: 15px 20px;
                gap: 15px;
                height: auto;
                background: var(--bg-panel);
                border-top: 1px solid var(--bg-border);
            }

            .wizard-footer>div {
                width: 100%;
                text-align: center;
            }

            .total-estimate {
                order: 1;
                /* Price on Top */
                margin-bottom: 0;
            }

            .btn-next {
                order: 2;
                /* Button Below */
                width: 100%;
                justify-content: center;
                padding: 16px;
                font-size: 1rem;
            }

            /* Hide previous button text to save space, make it icon only or small top link? */
            /* User didn't complain about Prev. Let's make it a small link at bottom or top-left */
            .btn-prev {
                display: none;
                /* Templarily hide to solve overcrowding as it wasn't requested */
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .wizard-container {
                padding: 0 15px;
                margin-top: 100px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .wizard-footer {
                padding: 15px 20px;
            }

            .step-header h1 {
                font-size: 2rem;
            }

            .wizard-container {
                padding-bottom: 150px !important;
                /* Tightened buffer */
            }
        }
    </style>
    <script src="js/region-manager.js"></script>
    <script src="js/data/suit-pricing.js"></script>
    <script src="js/pricing-engine.js"></script>
</head>

                    <button class="gender-btn" onclick="selectGender('female')">
                        <i data-lucide="gem"></i>
                        Women
                    </button>
                </div>
            </div>
        </div>


    </div>

            },
            {
                id: 'vest',
                title: 'Waistcoat',
                desc: 'Optional 3rd piece for formality.',
                items: [
                    { id: 'v-none', name: 'No Vest (2-Piece)', desc: 'Standard suit configuration.', price: 0, icon: 'x-circle', img: 'https://i.postimg.cc/Fzn3Drn3/Chat-GPT-Image-Feb-21-2026-06-01-04-PM.png' },
                    { id: 'v-add', name: 'Add Vest (3-Piece)', desc: 'Includes matching waistcoat.', price: 86.95652174, icon: 'plus-circle', img: 'https://i.postimg.cc/nVwm8L0S/Chat-GPT-Image-Feb-21-2026-06-02-50-PM.png' }
                ]
            },
            {
                id: 'measurements',
                title: 'Measurements',
                desc: 'Please provide your measurements following the guide below.',
                type: 'measurements',
                sections: [
                    {
                        title: 'Blazer Measurements',
                        fields: [
                            { id: 'chest', label: 'Chest', desc: 'Around the fullest part of the chest, keeping the tape measure level.' },
                            { id: 'torso_waist', label: 'Torso Waist', desc: 'Around the narrowest part of the torso.' },
                            { id: 'shoulder', label: 'Shoulder', desc: 'From the edge of one shoulder, across the back, to the edge of the other shoulder.' },
                            { id: 'sleeve', label: 'Sleeve Length', desc: 'From the centre back of the neck, over the shoulder, and down to the wrist.' },
                            { id: 'jacket_len', label: 'Jacket Length', desc: 'From the base of the collar, down the centre back, to the desired length.' }
                        ]
                    },
                    {
                        title: 'Pants Measurements',
                        fields: [
                            { id: 'pant_waist', label: 'Pant Waist', desc: 'Around the natural waistline.' },
                            { id: 'inseam', label: 'Inseam', desc: 'From the crotch, down the inside of the leg, to the desired pant length.' },
                            { id: 'outseam', label: 'Outseam', desc: 'From the waist, down the outside of the leg, to the desired pant length.' },
                            { id: 'thigh', label: 'Thigh', desc: 'Around the fullest part of the thigh.' },
                            { id: 'rise', label: 'Rise', desc: 'From the crotch, up to the top of the pants (front and back).' }
                        ]
                    }
                ]
            },
            {
                id: 'details',
                title: 'Final Details',
                desc: 'Please provide your contact and delivery information to complete the order.',
                type: 'details'
            }
        ];

        // --- STATE ---
        let currentStepIndex = 0;
        let selections = {
            measurements: {},
            details: {}
        };

        const BASE_PRICE = 850;

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            // 0. Always Show Modal on Load (User Request)
            setTimeout(() => {
                document.getElementById('gender-modal').classList.add('active');
            }, 500);

            // Pre-select defaults for static steps ONLY
            steps.forEach(step => {
                if (step.items) {
                    selections[step.id] = step.items[0];
                }
            });
            // Default texture
            const firstFabricKey = Object.keys(fabricData)[0];
            selections['texture'] = { id: firstFabricKey, ...fabricData[firstFabricKey] };

            // Default color (based on default texture)
            selections['color'] = { id: fabricData[firstFabricKey].colors[0], name: fabricData[firstFabricKey].colors[0], price: 0 };

            render();

            // Anti-Theft: Disable right-click and drag on images
            document.querySelectorAll('img').forEach(img => {
                img.addEventListener('contextmenu', (e) => e.preventDefault());
                img.addEventListener('dragstart', (e) => e.preventDefault());
            });
        });

        // --- RENDER ---
        function render() {
            const container = document.getElementById('app');
            const step = steps[currentStepIndex];

            // 1. Progress
            let progressHtml = '<div class="progress-track">';
            steps.forEach((s, idx) => {
                let classes = 'step-dot';
                if (idx < currentStepIndex) classes += ' completed';
                if (idx === currentStepIndex) classes += ' active';
                progressHtml += `
                    <div class="${classes}">
                        ${idx < currentStepIndex ? '<i data-lucide="check" width="16"></i>' : (idx + 1)}
                    </div>
                `;
            });
            progressHtml += '</div>';

            // 2. Header
            const headerHtml = `
                <div class="step-header">
                    <div style="color:var(--gold-primary); text-transform:uppercase; letter-spacing:2px; font-size:0.8rem; margin-bottom:10px;">
                        Step ${currentStepIndex + 1} of ${steps.length}
                    </div>
                    <h1>${step.title}</h1>
                    <p>${step.desc}</p>
                </div>
            `;

            // 3. Content Generation
            let contentHtml = '';

            // TYPE: TEXTURE
            if (step.type === 'texture') {
                contentHtml += '<div class="options-grid">';
                Object.entries(fabricData).forEach(([key, data]) => {
                    const isSelected = selections['texture'] && selections['texture'].id === key;
                    let inlineImgHtml = '';
                    if (data.img) {
                        inlineImgHtml = `
                            <div class="inline-preview-container">
                                <img src="${data.img}" alt="${data.name}" style="width: 100%; height: auto; display: block;">
                            </div>
                        `;
                    }
                    contentHtml += `
                        <div class="option-card ${isSelected ? 'selected' : ''}" onclick="selectTexture('${key}')">
                            <div class="card-header">
                                <i data-lucide="layers" class="card-icon" width="24"></i>
                                <div class="card-title">${data.name}</div>
                            </div>
                            <div class="card-desc">${data.desc}</div>
                            ${inlineImgHtml}
                        </div>
                    `;
                });
                contentHtml += '</div>';
            }
            // TYPE: COLOR
            else if (step.type === 'color') {
                const currentTextureId = selections['texture'].id;
                const availableColors = fabricData[currentTextureId].colors;

                contentHtml += '<div class="options-grid">';
                availableColors.forEach(color => {
                    const isSelected = selections['color'] && selections['color'].id === color;
                    const hex = getColorHex(color);

                    contentHtml += `
                        <div class="option-card ${isSelected ? 'selected' : ''}" onclick="selectColor('${color}')">
                            <div class="card-header">
                                <div class="color-dot" style="background-color:${hex}"></div>
                                <div class="card-title">${color}</div>
                            </div>
                            <div class="card-desc">Selected from ${fabricData[currentTextureId].name} palette.</div>
                        </div>
                    `;
                });
                contentHtml += '</div>';
            }
            // TYPE: MEASUREMENTS
            else if (step.type === 'measurements') {
                contentHtml += '<div class="measurement-form" style="padding-bottom:50px;">';
                step.sections.forEach(section => {
                    contentHtml += `<div class="measurement-group"><h3>${section.title}</h3><div class="options-grid">`; // Re-using grid for layout
                    section.fields.forEach(field => {
                        const val = selections.measurements[field.id] || '';
                        contentHtml += `
                            <div class="measure-field">
                                <label>${field.label}</label>
                                <p>${field.desc}</p>
                                <input type="text" placeholder="e.g. 40 in" value="${val}" onchange="saveMeasurement('${field.id}', this.value)">
                            </div>
                        `;
                    });
                    contentHtml += `</div></div>`;
                });
                contentHtml += '</div>';
            }
            // TYPE: DETAILS
            else if (step.type === 'details') {
                const details = selections.details || {};

                contentHtml += '<div class="measurement-form" style="padding-bottom:50px;">';

                // 1. Personal Info
                contentHtml += `
                    <div class="measurement-group">
                        <h3>Contact Information</h3>
                        <div class="options-grid" style="grid-template-columns: 1fr;">
                            <div class="measure-field">
                                <label>Full Name</label>
                                <input type="text" placeholder="John Doe" value="${details.name || ''}" onchange="saveDetail('name', this.value)">
                            </div>
                            <div class="measure-field">
                                <label>Email Address</label>
                                <input type="email" placeholder="john@example.com" value="${details.email || ''}" onchange="saveDetail('email', this.value)">
                            </div>
                            <div class="measure-field">
                                <label>Phone Number</label>
                                <input type="tel" placeholder="(876) 555-1234" value="${details.phone || ''}" onchange="saveDetail('phone', this.value)">
                            </div>
                        </div>
                    </div>
                `;

                // 2. Location
                contentHtml += `
                    <div class="measurement-group">
                        <h3>Order Type</h3>
                         <div class="options-grid">
                            <div class="option-card ${details.location === 'local' ? 'selected' : ''}" onclick="saveDetail('location', 'local'); toggleDetailsSections();">
                                <div class="card-header">
                                    <i data-lucide="map-pin" class="card-icon" width="24"></i>
                                    <div class="card-title">Local (Jamaica)</div>
                                </div>
                                <div class="card-desc">I am currently in Jamaica.</div>
                            </div>
                            <div class="option-card ${details.location === 'abroad' ? 'selected' : ''}" onclick="saveDetail('location', 'abroad'); toggleDetailsSections();">
                                <div class="card-header">
                                    <i data-lucide="globe" class="card-icon" width="24"></i>
                                    <div class="card-title">Overseas</div>
                                </div>
                                <div class="card-desc">International shipping required.</div>
                            </div>
                        </div>
                    </div>
                `;

                // 3. Delivery Method (Local Only)
                const showDeliveryMethod = details.location === 'local';
                contentHtml += `
                    <div id="section-delivery-method" class="measurement-group" style="display: ${showDeliveryMethod ? 'block' : 'none'};">
                        <h3>Delivery Method</h3>
                        <div class="options-grid">
                            <div class="option-card ${details.deliveryMethod === 'pickup' ? 'selected' : ''}" onclick="saveDetail('deliveryMethod', 'pickup'); toggleDetailsSections();">
                                <div class="card-header">
                                    <i data-lucide="store" class="card-icon" width="24"></i>
                                    <div class="card-title">Store Pickup</div>
                                </div>
                                <div class="card-desc">Collect from our studio.</div>
                            </div>
                            <div class="option-card ${details.deliveryMethod === 'delivery' ? 'selected' : ''}" onclick="saveDetail('deliveryMethod', 'delivery'); toggleDetailsSections();">
                                <div class="card-header">
                                    <i data-lucide="truck" class="card-icon" width="24"></i>
                                    <div class="card-title">Delivery</div>
                                </div>
                                <div class="card-desc">Courier delivery to your door.</div>
                            </div>
                        </div>
                    </div>
                `;

                // 4. Delivery Service (Local Delivery Only)
                const showService = details.location === 'local' && details.deliveryMethod === 'delivery';
                contentHtml += `
                    <div id="section-delivery-service" class="measurement-group" style="display: ${showService ? 'block' : 'none'};">
                        <h3>Choose Courier</h3>
                        <div class="options-grid">
                            <div class="option-card ${details.courier === 'knutsford' ? 'selected' : ''}" onclick="saveDetail('courier', 'knutsford');">
                                <div class="card-header"><div class="card-title">Knutsford Express</div></div>
                            </div>
                            <div class="option-card ${details.courier === 'zipmail' ? 'selected' : ''}" onclick="saveDetail('courier', 'zipmail');">
                                <div class="card-header"><div class="card-title">Zipmail</div></div>
                            </div>
                             <div class="option-card ${details.courier === 'tara' ? 'selected' : ''}" onclick="saveDetail('courier', 'tara');">
                                <div class="card-header"><div class="card-title">Tara Courier</div></div>
                            </div>
                             <div class="option-card ${details.courier === 'bearer' ? 'selected' : ''}" onclick="saveDetail('courier', 'bearer');">
                                <div class="card-header"><div class="card-title">Bearer Service</div></div>
                            </div>
                        </div>
                    </div>
                `;

                // 5. Address (Delivery Local OR Abroad)
                const showAddress = details.location === 'abroad' || (details.location === 'local' && details.deliveryMethod === 'delivery');
                contentHtml += `
                    <div id="section-address" class="measurement-group" style="display: ${showAddress ? 'block' : 'none'};">
                        <h3>Shipping Address</h3>
                        <div class="options-grid" style="grid-template-columns: 1fr;">
                             <div class="measure-field">
                                <label>Address Line 1</label>
                                <input type="text" placeholder="Street address" value="${details.address1 || ''}" onchange="saveDetail('address1', this.value)">
                            </div>
                             <div class="measure-field">
                                <label>Address Line 2</label>
                                <input type="text" placeholder="Apt, Suite, etc (optional)" value="${details.address2 || ''}" onchange="saveDetail('address2', this.value)">
                            </div>
                            <div class="measure-field">
                                <label>City / Parish / State</label>
                                <input type="text" placeholder="" value="${details.city || ''}" onchange="saveDetail('city', this.value)">
                            </div>
                             <div class="measure-field">
                                <label>Country</label>
                                <input type="text" placeholder="e.g. Jamaica, USA" value="${details.country || ''}" onchange="saveDetail('country', this.value)">
                            </div>
                        </div>
                    </div>
                `;

                contentHtml += '</div>';
            }
            // TYPE: STANDARD/STATIC
            else {
                contentHtml += '<div class="options-grid">';
                step.items.forEach(item => {
                    const isSelected = selections[step.id] && selections[step.id].id === item.id;
                    let inlineImgHtml = '';
                    if (item.img) {
                        inlineImgHtml = `
                            <div class="inline-preview-container">
                                <img src="${item.img}" alt="${item.name}" style="width: 100%; height: auto; display: block;">
                            </div>
                        `;
                    }
                    contentHtml += `
                        <div class="option-card ${isSelected ? 'selected' : ''}" onclick="selectStatic('${step.id}', '${item.id}')">
                            <div class="card-header">
                                <i data-lucide="${item.icon}" class="card-icon" width="24"></i>
                                <div class="card-title">${item.name}</div>
                                ${item.price > 0 ? `<div class="card-price">+${window.formatJMDWithRegion ? window.formatJMDWithRegion(window.calculateDisplayPrice ? window.calculateDisplayPrice(item.price * 230) : (item.price * 230)) : CurrencyManager.format(item.price)}</div>` : ''}
                            </div>
                            <div class="card-desc">${item.desc}</div>
                            ${inlineImgHtml}
                        </div>
                    `;
                });
                contentHtml += '</div>';
            }

            container.innerHTML = progressHtml + headerHtml + contentHtml;
            updateFooter();
            lucide.createIcons();
        }

        // --- LOGIC ---
        function selectTexture(key) {
            if (selections['texture'] && selections['texture'].id === key) {
                // Deselect if already selected
                delete selections['texture'];
                delete selections['color']; // color depends on texture
            } else {
                selections['texture'] = { id: key, ...fabricData[key] };
                const validColors = fabricData[key].colors;
                selections['color'] = { id: validColors[0], name: validColors[0], price: 0 };
            }
            render();
        }

        function selectColor(colorName) {
            if (selections['color'] && selections['color'].id === colorName) {
                delete selections['color'];
            } else {
                selections['color'] = { id: colorName, name: colorName, price: 0 };
            }
            render();
        }

        function selectStatic(stepId, itemId) {
            const step = steps.find(s => s.id === stepId);
            const item = step.items.find(i => i.id === itemId);

            if (selections[stepId] && selections[stepId].id === item.id) {
                delete selections[stepId];
            } else {
                selections[stepId] = item;
            }

            render();
        }

        function saveMeasurement(fieldId, value) {
            if (!selections.measurements) selections.measurements = {};
            selections.measurements[fieldId] = value;
        }

        function saveDetail(fieldId, value) {
            if (!selections.details) selections.details = {};
            selections.details[fieldId] = value;
            // No full re-render for text inputs to keep focus, but re-render for selections to update UI state
            if (['location', 'deliveryMethod', 'courier'].includes(fieldId)) {
                // Determine if we need to reset downstream choices
                if (fieldId === 'location') {
                    if (value === 'abroad') {
                        delete selections.details.deliveryMethod;
                        delete selections.details.courier;
                    }
                }
                render();
            }
        }

        function toggleDetailsSections() {
            // This is handled by render() now since we re-render on selection.
            // Keeping function name if we want to switch to DOM manipulation later for smoother UX.
        }




        function getColorHex(name) {
            const map = {
                'Black': '#000000', 'Blue': '#1a237e', 'Navy Blue': '#0d47a1',
                'Royal Blue': '#2962ff', 'Cream': '#fff59d', 'White': '#ffffff',
                'Grey': '#9e9e9e', 'Dark Grey': '#424242', 'Light Grey': '#bdbdbd',
                'Red': '#d32f2f', 'Olive Green': '#558b2f', 'Pink': '#f48fb1',
                'Dark Pink': '#ad1457', 'Light Pink': '#f8bbd0', 'Light Khaki': '#f0f4c3',
                'Dark Khaki': '#c0ca33'
            };
            return map[name] || '#888';
        }

        function handleNext() {
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                render();
                window.scrollTo(0, 0);
            } else {
                finish();
            }
        }

        function handleBack() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                render();
                window.scrollTo(0, 0);
            }
        }

        function updateFooter() {
            const backBtn = document.getElementById('btn-back');
            const nextBtn = document.getElementById('btn-next');
            const priceDisplay = document.getElementById('price-display');

            backBtn.style.visibility = currentStepIndex === 0 ? 'hidden' : 'visible';

            if (currentStepIndex === steps.length - 1) {
                nextBtn.innerHTML = 'Proceed to Checkout <i data-lucide="credit-card"></i>';
            } else {
                nextBtn.innerHTML = 'Next Step <i data-lucide="arrow-right"></i>';
            }

            if (window.PricingEngine && window.PricingEngine.isLoaded) {
                const configSelection = {
                    styleId: selections.vest && selections.vest.id === 'v-add' ? 'suit_3_piece' : 'suit_2_piece',
                    fabricId: selections.texture ? selections.texture.id : null,
                    fabricGrade: selections.texture ? selections.texture.id : 'cool-wool', // Mapped one-to-one in config
                    constructionType: 'half_canvas',
                    options: [],
                    measurements: selections.measurements || {}
                };

                ['jacket', 'lapels', 'pants', 'vest'].forEach(k => {
                    if (selections[k] && selections[k].id) configSelection.options.push(selections[k].id);
                });

                const estimate = window.PricingEngine.calculateEstimate(configSelection);
                if (estimate) {
                    priceDisplay.innerText = estimate.finalDisplay;
                    window.currentPricingEstimate = estimate;
                    return;
                }
            }

            // Fallback while loading
            priceDisplay.innerText = "Calculating...";
        }

        function finish() {
            if (!window.RegionManager || !window.RegionManager.state.region) {
                alert("Please select your shopping region first.");
                if (window.RegionManager) window.RegionManager.showOverlay();
                return;
            }

            // Re-run estimate just in case
            updateFooter();
            const estimate = window.currentPricingEstimate;
            if (!estimate) {
                alert("Prices are calculating. Please try again in a moment.");
                return;
            }

            // 1. Prepare Configuration Data
            const config = {};
            const optionIds = [];
            const orderKeys = ['texture', 'color', 'jacket', 'lapels', 'pants', 'vest', 'buttons', 'lining'];
            orderKeys.forEach(key => {
                if (selections[key]) {
                    config[key] = selections[key].name;
                    if (selections[key].id) optionIds.push(selections[key].id);
                }
            });

            // 2. Prepare Data for Checkout aligning to JSON Schema
            const checkoutData = {
                suitId: 'Custom Bespoke Suit',
                gender: selections.gender || 'male',
                measurements: selections.measurements || {},
                config: config,
                details: selections.details || {},
                // Pricing Engine Output
                pricingEngineSelection: {
                    styleId: selections.vest && selections.vest.id === 'v-add' ? 'suit_3_piece' : 'suit_2_piece',
                    fabricId: selections.texture ? selections.texture.id : null,
                    fabricGrade: selections.texture ? selections.texture.id : 'cool-wool',
                    constructionType: 'half_canvas',
                    options: optionIds,
                    measurements: selections.measurements || {}
                },
                pricing: estimate
            };

            // 3. Save & Redirect
            sessionStorage.setItem('custom_suit_data', JSON.stringify(checkoutData));
            window.location.href = 'purchase-flow.html?suit=Custom';
        }

        function capitalize(s) {
            return s.charAt(0).toUpperCase() + s.slice(1);
        }

        // Anti-Theft: Disable right-click and drag on images
        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('contextmenu', (e) => e.preventDefault());
            img.addEventListener('dragstart', (e) => e.preventDefault());
        });


        function selectGender(gender) {
            selections.gender = gender;
            // sessionStorage.setItem('custom_gender_selection', gender); // Disabled per user request to show modal on refresh

            // Update Nav Display
            const navCenter = document.querySelector('.nav-center');
            if (navCenter) {
                navCenter.innerHTML = `Bespoke Studio <span style="color:var(--text-muted); margin:0 10px;">|</span> <span style="color:white;">${gender === 'male' ? 'Men' : 'Women'}</span>`;
            }

            updateMeasurementFields(gender);
            render();
            document.getElementById('gender-modal').classList.remove('active');
        }

        function updateMeasurementFields(gender) {
            const measureStep = steps.find(s => s.id === 'measurements');
            if (!measureStep) return;

            const blazerSection = measureStep.sections.find(s => s.title.includes('Blazer') || s.title.includes('Jacket'));
            if (blazerSection) {
                const chestField = blazerSection.fields.find(f => f.id === 'chest');
                if (chestField) {
                    if (gender === 'female') {
                        chestField.label = 'Bust';
                        chestField.desc = 'Around the fullest part of the bust, keeping the tape measure level.';
                    } else {
                        chestField.label = 'Chest';
                        chestField.desc = 'Around the fullest part of the chest, keeping the tape measure level.';
                    }
                }
            }

            const pantSection = measureStep.sections.find(s => s.title.includes('Pants') || s.title.includes('Trouser'));
            if (pantSection) {
                const hasHips = pantSection.fields.find(f => f.id === 'hips');
                if (gender === 'female' && !hasHips) {
                    // Add Hips after waist (index 1)
                    pantSection.fields.splice(1, 0, { id: 'hips', label: 'Hips', desc: 'Around the fullest part of the hips.' });
                } else if (gender === 'male' && hasHips) {
                    // Remove Hips
                    pantSection.fields = pantSection.fields.filter(f => f.id !== 'hips');
                }
            }
        }

        window.addEventListener('currency-change', render);
        window.addEventListener('region-change', render);
        window.addEventListener('pricing-engine-ready', render);
    </script>
    <script src="js/back-to-top.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const isJM = window.Region && window.Region.isJamaica();
            document.querySelectorAll("a[href=\"book.html\"]").forEach(link => {
                if (!isJM) {
                    link.style.display = "none";
                }
            });
        });
    </script>
